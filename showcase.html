<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Showcase Work | Absolute Panel & Paint 2010 Ltd</title>
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ... (keep all your existing styles) ... */

    /* === IMPROVED MODAL === */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.92);
      justify-content: center;
      align-items: center;
    }
    .modal.active { display: flex; }

    .modal-content {
      position: relative;
      max-width: 92%;
      max-height: 92%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .modal-content img {
      max-width: 100%;
      max-height: 78vh;
      object-fit: contain;
      border-radius: 6px;
    }

    .modal-description {
      color: white;
      text-align: center;
      margin-top: 1rem;
      font-size: 1.15rem;
      max-width: 700px;
    }

    /* Bigger Close Button */
    .close {
      position: absolute;
      top: -55px;
      right: 0;
      color: white;
      font-size: 52px;
      font-weight: bold;
      cursor: pointer;
      line-height: 1;
    }
    .close:hover { color: var(--orange); }

    /* Modal Arrows */
    .modal-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      font-size: 2.2rem;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-arrow:hover {
      background: var(--orange);
    }
    .modal-arrow.prev { left: -70px; }
    .modal-arrow.next { right: -70px; }

    @media (max-width: 700px) {
      .modal-arrow.prev { left: 10px; }
      .modal-arrow.next { right: 10px; }
    }
  </style>
</head>
<body>

  <!-- NAV (keep your current matching nav) -->

  <div class="page-header">
    <h1>Showcase Work</h1>
  </div>

  <div class="gallery-grid" id="gallery-grid"></div>

  <!-- IMPROVED MODAL -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <!-- Close Button -->
      <span class="close">&times;</span>

      <!-- Arrows -->
      <button class="modal-arrow prev" onclick="prevImage()">←</button>
      <button class="modal-arrow next" onclick="nextImage()">→</button>

      <img id="modal-image" src="" alt="">
      <p id="modal-description" class="modal-description"></p>
    </div>
  </div>

  <script>
    let galleryData = [];
    let currentIndex = 0;

    async function loadGallery() {
      const res = await fetch('showcase.json');
      galleryData = await res.json();
      const container = document.getElementById('gallery-grid');

      galleryData.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'gallery-item';
        div.setAttribute('data-caption', item.description);
        div.innerHTML = `<img src="${item.image}" alt="">`;

        div.addEventListener('click', () => {
          openModal(index);
        });

        container.appendChild(div);
      });
    }

    function openModal(index) {
      currentIndex = index;
      const modal = document.getElementById('modal');
      const img = document.getElementById('modal-image');
      const desc = document.getElementById('modal-description');

      img.src = galleryData[currentIndex].image;
      desc.textContent = galleryData[currentIndex].description || '';

      modal.classList.add('active');
      document.body.style.overflow = 'hidden'; // Scroll lock
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.remove('active');
      document.body.style.overflow = ''; // Restore scroll
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % galleryData.length;
      updateModalImage();
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + galleryData.length) % galleryData.length;
      updateModalImage();
    }

    function updateModalImage() {
      const img = document.getElementById('modal-image');
      const desc = document.getElementById('modal-description');

      img.src = galleryData[currentIndex].image;
      desc.textContent = galleryData[currentIndex].description || '';
    }

    function setupModal() {
      const modal = document.getElementById('modal');

      // Close on X
      document.querySelector('.close').addEventListener('click', closeModal);

      // Close when clicking outside the image
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
      });

      // Keyboard support
      document.addEventListener('keydown', (e) => {
        if (!modal.classList.contains('active')) return;

        if (e.key === 'Escape') closeModal();
        if (e.key === 'ArrowRight') nextImage();
        if (e.key === 'ArrowLeft') prevImage();
      });
    }

    function setupMobileMenu() {
      const toggle = document.getElementById('navToggle');
      const links = document.getElementById('navLinks');

      if (toggle && links) {
        toggle.addEventListener('click', () => links.classList.toggle('active'));
        document.querySelectorAll('.nav-links a').forEach(link => {
          link.addEventListener('click', () => links.classList.remove('active'));
        });
      }
    }

    window.onload = function () {
      loadGallery();
      setupModal();
      setupMobileMenu();
    };
  </script>
</body>
</html>
