<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Copy the same <head> from index.html -->
</head>
<body>
  <h1 style="text-align:center; margin:2rem 0;">Showcase Work</h1>
  
  <div class="container">
    <div class="gallery-grid" id="full-gallery" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:1rem;"></div>
  </div>

  <script>
    async function loadFullGallery() {
      const res = await fetch('showcase.json');
      const data = await res.json();
      const container = document.getElementById('full-gallery');

      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'gallery-item';
        div.innerHTML = `<img src="${item.image}" alt="">`;
        div.setAttribute('data-caption', item.description);
        div.addEventListener('click', () => openModal(item.image, item.description));
        container.appendChild(div);
      });
    }

    // Paste the openModal + modal HTML + setupModal from index.html here
    loadFullGallery();
  </script>
</body>
</html>
