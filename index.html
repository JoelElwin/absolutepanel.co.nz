<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Absolute Panel & Paint 2010 Ltd | Papakura, Auckland</title>
  <meta name="description" content="Specialists in accident repairs, rust repairs, restorations, insurance work and full repaints. Based in Papakura, Auckland. Call 09 299 9895." />
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <meta property="og:image" content="Images/Logo/Logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* Your existing styles here (keep everything the same) */
    /* ... paste your current styles ... */

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }
    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      background: #f5f5f3;
    }
    .gallery-item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }
    .gallery-item::after {
      content: attr(data-caption);
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      color: white;
      padding: 0.9rem 1rem;
      font-size: 0.95rem;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <!-- NAV (keep your current nav) -->
  <!-- ... your existing nav code ... -->

  <!-- HERO (keep as is) -->
  <!-- ... your existing hero ... -->

  <!-- TRUST BAR (keep as is) -->

  <!-- ==================== SHOWCASE GALLERY ==================== -->
  <section id="showcase">
    <div class="container">
      <h2 class="section-title">Showcase <span>Work</span></h2>
      <div class="divider"></div>
      <div class="gallery-grid" id="showcase-gallery">
        <!-- Populated dynamically by JavaScript -->
      </div>
    </div>
  </section>

  <!-- ==================== BEFORE & AFTER GALLERY ==================== -->
  <section id="beforeafter">
    <div class="container">
      <h2 class="section-title">Before <span>&amp; After</span></h2>
      <div class="divider"></div>
      <div class="gallery-grid" id="beforeafter-gallery">
        <!-- Populated dynamically by JavaScript -->
      </div>
    </div>
  </section>

  <!-- ==================== WORKING GALLERY ==================== -->
  <section id="working">
    <div class="container">
      <h2 class="section-title">Work in <span>Progress</span></h2>
      <div class="divider"></div>
      <div class="gallery-grid" id="working-gallery">
        <!-- Populated dynamically by JavaScript -->
      </div>
    </div>
  </section>

  <!-- SERVICES, TESTIMONIALS, ABOUT, CONTACT, FOOTER (keep as is) -->

  <script>
    // Function to load a gallery from JSON
    async function loadGallery(jsonFile, containerId) {
      try {
        const response = await fetch(jsonFile);
        const data = await response.json();
        const container = document.getElementById(containerId);

        data.forEach(item => {
          const div = document.createElement('div');
          div.className = 'gallery-item';
          div.setAttribute('data-caption', item.description);
          div.innerHTML = `<img src="${item.image}" alt="${item.description}">`;
          container.appendChild(div);
        });
      } catch (error) {
        console.error(`Error loading ${jsonFile}:`, error);
      }
    }

    // Load all three galleries when page loads
    window.onload = function() {
      loadGallery('showcase.json', 'showcase-gallery');
      loadGallery('beforeafter.json', 'beforeafter-gallery');
      loadGallery('working.json', 'working-gallery');
    };

    // Your existing mobile menu script
    const toggle = document.getElementById('navToggle');
    const links = document.getElementById('navLinks');
    if (toggle && links) {
      toggle.addEventListener('click', () => links.classList.toggle('active'));
      document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', () => links.classList.remove('active'));
      });
    }
  </script>
</body>
</html>
